baseURL = "https://theindicatorlab.com"
locale = "en-US"
title = "The Indicator Lab"
theme = "stack"

enableInlineShortcodes = true
enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false
enableEmoji = true
pygmentsUseClasses = true

defaultContentLanguage = "en"

[outputs]
  home = ["HTML", "RSS", "JSON"]
  page = ["HTML", "JSON"]

[taxonomies]
  category = "categories"
  tag = "tags"

[params]
  mainSections = ["reviews"]
  description = "Honest, in-depth TradingView indicator reviews. Find the best indicators for your trading strategy."
  rssFullContent = true
  SortBy = "default"

  [params.footer]
    since = 2026
    customText = ""

  [params.dateFormat]
    published = "Jan 2, 2006"
    lastUpdated = "Jan 2, 2006"

  [params.sidebar]
    compact = false
    avatar = ""

  [params.article]
    headingAnchor = false
    math = false
    toc = true
    readingTime = true

    [params.article.list]
      showTags = true

  [params.colorScheme]
    toggle = true
    default = "light"

  [params.imageProcessing]
    [params.imageProcessing.content]
      widths = [800, 1600, 2400]
      enabled = true
    [params.imageProcessing.thumbnail]
      enabled = true

  [params.opengraph.twitter]
    site = "IndicatorLabs"
    card = "summary_large_image"

[menu]
  [[menu.main]]
    identifier = "reviews"
    name = "Reviews"
    url = "/reviews/"
    weight = 10

  [[menu.main]]
    identifier = "categories"
    name = "Categories"
    url = "/categories/"
    weight = 20

  [[menu.main]]
    identifier = "about"
    name = "About"
    url = "/about/"
    weight = 30

  [[menu.main]]
    identifier = "disclaimer"
    name = "Disclaimer"
    url = "/disclaimer/"
    weight = 40

  [[menu.main]]
    identifier = "search"
    name = "Search"
    url = "/search/"
    weight = 50
# Analytics (Umami Cloud — set website_id when email verified)
[params.analytics]
  umami = "fc79be2c-0e11-4fb3-98fc-00ffba8c0390"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4

  [[menu.main]]
    identifier = "daily-digest"
    name = "Daily Digest"
    url = "/daily-digest/"
    weight = 25