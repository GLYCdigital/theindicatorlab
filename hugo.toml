baseURL = "https://theindicatorlab.com"
locale = "en-US"
title = "The Indicator Lab"
theme = "PaperMod"

enableInlineShortcodes = true
enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false

enableEmoji = true
pygmentsUseClasses = true
mainsections = ["reviews"]

[minify]
  disableXML = true
  minifyOutput = true

defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false

[params]
  env = "production"
  title = "The Indicator Lab"
  description = "Honest, in-depth TradingView indicator reviews. Find the best indicators for your trading strategy."
  keywords = ["TradingView", "indicators", "trading", "technical analysis", "Pine Script"]
  author = "Til"
  defaultTheme = "dark"
  disableThemeToggle = true
  ShowShareButtons = true
  ShowReadingTime = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowPostNavLinks = true
  ShowToc = true
  canonical = true
  hidemeta = false
  hideSummary = false

  [params.homeInfoParams]
    Title = "The Indicator Lab 🔬"
    Content = "Honest, in-depth reviews of TradingView indicators. Each review covers features, pros & cons, who it's for, and how to use it. Updated daily."

  [[params.social]]
    name = "twitter"
    url = "https://twitter.com/theindicatorlab"

  [params.schema]
    type = "Review"
    itemType = "https://schema.org/Review"

[menu]
  [[menu.main]]
    identifier = "reviews"
    name = "Reviews"
    url = "/reviews/"
    weight = 10

  [[menu.main]]
    identifier = "categories"
    name = "Categories"
    url = "/categories/"
    weight = 20

  [[menu.main]]
    identifier = "about"
    name = "About"
    url = "/about/"
    weight = 30

  [[menu.main]]
    identifier = "disclaimer"
    name = "Disclaimer"
    url = "/disclaimer/"
    weight = 40
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4

[outputs]
  home = ["HTML", "RSS", "JSON"]

[taxonomies]
  category = "categories"
  tag = "tags"
  type = "types"
