<svg xmlns="http://www.w3.org/2000/svg" width="240" height="60" viewBox="0 0 240 60">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4aa"/>
      <stop offset="100%" style="stop-color:#00b4d8"/>
    </linearGradient>
  </defs>
  
  <!-- Badge background -->
  <rect x="1" y="1" width="238" height="58" rx="8" fill="url(#bg)" stroke="url(#accent)" stroke-width="1.5"/>
  
  <!-- Microscope icon -->
  <circle cx="30" cy="26" r="10" fill="none" stroke="#00d4aa" stroke-width="2"/>
  <line x1="36" y1="32" x2="42" y2="38" stroke="#00d4aa" stroke-width="2" stroke-linecap="round"/>
  <line x1="42" y1="38" x2="46" y2="42" stroke="#00d4aa" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Checkmark -->
  <circle cx="28" cy="40" r="6" fill="#00d4aa" opacity="0.15"/>
  <path d="M25 40l2 2 4-4" fill="none" stroke="#00d4aa" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Text -->
  <text x="55" y="24" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#ffffff">INDICATOR LAB</text>
  <text x="55" y="40" font-family="system-ui, -apple-system, sans-serif" font-size="9.5" fill="#8899aa">TESTED &amp; REVIEWED</text>
  
  <!-- Verification link -->
  <text x="55" y="52" font-family="system-ui, -apple-system, sans-serif" font-size="7.5" fill="#00d4aa" opacity="0.7">theindicatorlab.com</text>
</svg>
