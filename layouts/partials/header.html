{{/* Header partial for The Indicator Lab */}}
<header class="site-header">
  <div class="container header-inner">
    <a href="/" class="site-logo">The Indicator<span class="dot">.</span>Lab</a>
    <input type="checkbox" id="menu-toggle" class="menu-toggle-input" aria-label="Toggle menu">
    <label for="menu-toggle" class="menu-toggle-label">
      <span class="menu-bar"></span>
      <span class="menu-bar"></span>
      <span class="menu-bar"></span>
    </label>
    <nav class="site-nav">
      <ul class="nav-links">
        {{ range .Site.Menus.main }}
        <li><a href="{{ .URL }}" {{ if eq $.RelPermalink .URL }}class="active"{{ end }}>{{ .Name }}</a></li>
        {{ end }}
      </ul>
    </nav>
  </div>
</header>
