{{ define "main" }}
<section class="page-hero" style="background-color: var(--primary); color: #fff;">
  <div class="container">
    <h1 style="color: #fff;">{{ .Title }}</h1>
    <p style="max-width:640px;color: rgba(255,255,255,0.85);">Search {{ len (where .Site.RegularPages "Section" "reviews") }} TradingView indicator reviews. Find the right tools for your strategy.</p>
  </div>
</section>

<section class="section-white search-section" style="padding: 4rem 0;">
  <div class="container">
    <div id="search-ui"></div>
  </div>
</section>

<link href="/pagefind/pagefind-ui.css" rel="stylesheet">
<script src="/pagefind/pagefind-ui.js"></script>
<script>
  window.addEventListener('DOMContentLoaded', () => {
    new PagefindUI({
      element: "#search-ui",
      showSubResults: false,
      showImages: true,
      excerptLength: 25,
      baseUrl: "/",
    });
  });
</script>
{{ end }}
