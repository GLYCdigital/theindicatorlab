{{ define "main" }}
<section class="courses-section">
  <h1>{{ .Title }}</h1>
  {{ .Content }}

  <div class="course-grid" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap:1.5rem; margin:2rem 0;">
    {{ range .Pages.ByDate.Reverse }}
    <a href="{{ .RelPermalink }}" style="text-decoration:none; color:inherit;">
      <div class="course-card" style="border:1px solid var(--card-border); border-radius:var(--radius); padding:1.5rem; background:var(--card-bg); transition:transform 0.2s, box-shadow 0.2s; display:flex; flex-direction:column;"
           onmouseover="this.style.transform='translateY(-4px)'; this.style.boxShadow='0 8px 24px rgba(0,0,0,0.12)';"
           onmouseout="this.style.transform=''; this.style.boxShadow='';">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem;">
          <h3 style="margin:0; font-size:1.1rem;">{{ .Title }}</h3>
          {{ with .Params.level }}<span class="badge" style="font-size:0.8rem; padding:2px 10px; border-radius:100px; background:var(--accent); color:#fff;">{{ . }}</span>{{ end }}
        </div>
        {{ with .Description }}<p style="margin:0; color:var(--text-secondary); font-size:0.9rem; line-height:1.4;">{{ . }}</p>{{ end }}
        {{ with .Params.modules }}<p style="margin:0.75rem 0 0; font-size:0.85rem; color:var(--text-muted);">{{ len . }} modules</p>{{ end }}
      </div>
    </a>
    {{ end }}
  </div>
</section>
{{ end }}
