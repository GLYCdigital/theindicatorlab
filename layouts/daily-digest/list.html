{{ define "main" }}
<main class="main list" role="main">
  <header class="main-header">
    <h1 class="main-title">{{ .Title }}</h1>
    <p style="font-size: 2.2rem; font-weight: 600; line-height: 1.5; color: var(--card-text-color-main);">Daily market recap with technical screening signals.</p>
  </header>
  <div class="article-list" style="display: flex; flex-direction: column; gap: 8px;">
    {{ range .Pages }}
    <article class="article" style="padding: 12px 20px; margin: 0;">
      <h2 style="margin: 0; font-size: 1.6rem;"><a href="{{ .RelPermalink }}" style="color: var(--card-text-color-main);">{{ .Title }}</a></h2>
      <p style="margin: 4px 0 0 0; font-size: 1.1rem; color: var(--card-text-color-secondary);">{{ .Description }}</p>
    </article>
    {{ end }}
  </div>
</main>
{{ end }}
