{{ define "main" }}
<section class="page-hero">
  <div class="container">
    <h1>Daily Market Recap</h1>
    <p>with technical screening signals</p>
  </div>
</section>

<section style="padding: 48px 0 64px;">
  <div class="container" style="max-width: 800px;">
    <div style="display: flex; flex-direction: column; gap: 12px;">
      {{ range .Pages.ByDate.Reverse }}
      <article style="padding: 16px 20px; background: var(--card-bg); border: 1px solid var(--card-border); border-radius: var(--radius);">
        <h2 style="margin: 0 0 4px; font-size: 1.6rem; font-weight: 600;">
          <a href="{{ .RelPermalink }}" style="color: var(--text); text-decoration: none;">{{ .Title }}</a>
        </h2>
        {{ with .Description }}
        <p style="margin: 0; font-size: 1.35rem; color: var(--text-secondary);">{{ . }}</p>
        {{ end }}
        <p style="margin: 6px 0 0; font-size: 1.2rem; color: var(--text-muted);">{{ .Date.Format "Jan 2, 2006" }}</p>
      </article>
      {{ end }}
    </div>
  </div>
</section>
{{ end }}
