{{ define "main" }}
<main class="main list" role="main">
  <header class="main-header">
    <h1 class="main-title">{{ .Title }}</h1>
    <p style="font-size: 2.2rem; font-weight: 600; line-height: 1.5; color: var(--card-text-color-secondary);">Daily market recap with technical screening signals.</p>
  </header>
  <div class="article-list" style="display: flex; flex-direction: column; gap: 4px;">
    {{ range .Pages }}
    <article class="article" style="padding: 8px 16px; margin: 0;">
      <h2 style="margin: 0; font-size: 1.3rem;"><a href="{{ .RelPermalink }}">{{ .Title }}</a></h2>
      <p style="margin: 2px 0 0 0; font-size: 0.9rem;">{{ .Description }}</p>
    </article>
    {{ end }}
  </div>
</main>
{{ end }}
