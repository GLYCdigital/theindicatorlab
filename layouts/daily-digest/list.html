{{ define "main" }}
<main class="main list" role="main">
  <header class="main-header">
    <h1 class="main-title">{{ .Title }}</h1>
    <p style="font-size: 2.2rem; font-weight: 600; line-height: 1.5; color: var(--card-text-color-secondary);">Daily market recap with technical screening signals.</p>
  </header>
  <div class="article-list">
    {{ range .Pages }}
    <article class="article">
      <h2><a href="{{ .RelPermalink }}">{{ .Title }}</a></h2>
      <p>{{ .Description }}</p>
    </article>
    {{ end }}
  </div>
</main>
{{ end }}
