{{ define "body-class" }}
    article-page
{{ end }}

{{ define "main" }}
<article class="main-article">
    <div class="article-container" style="padding: var(--card-padding);">
        <header class="article-header">
            <h1 class="article-title">{{ .Title }}</h1>
        </header>
        <section class="article-content">
            {{ .Content }}
        </section>
    </div>
</article>
{{ end }}
